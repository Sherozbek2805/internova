<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internova – Post Internship</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>


<body class="bg-gradient-to-br from-[#0b1020] via-[#0f1b3d] to-[#0b1020] text-gray-200 min-h-screen">


<!-- NAVBAR -->

<header class="sticky top-0 z-30 backdrop-blur-xl bg-white/5 border-b border-white/10">

<div class="max-w-7xl mx-auto flex items-center justify-between px-6 py-4">

<div class="flex items-center gap-3">

<div class="w-8 h-8 rounded-lg bg-gradient-to-r from-blue-500 to-purple-500 flex items-center justify-center text-white font-bold">
▢
</div>

<span class="font-semibold text-lg">
Internova
</span>

</div>


<nav class="hidden md:flex gap-8 text-sm text-gray-300">

<a href="/discover" class="hover:text-white">
Ish qidirish
</a>

<a href="/companies" class="hover:text-white">
Kompaniyalar uchun
</a>

<a href="login.html" class="hover:text-white">
Kirish
</a>

<a href="/dashboard" class="hover:text-white">
Shahsiy Kabinet
</a>

</nav>


<a href = "/signup" class="px-4 py-2 rounded-lg bg-gradient-to-r from-blue-500 to-purple-500 text-white text-sm shadow-lg hover:opacity-90 transition">
Ro'yxatdan o'tish
</a>

</div>

</header>



<!-- PAGE CONTENT -->

<section class="max-w-3xl mx-auto px-6 py-16">

<h1 class="text-3xl font-semibold mb-10">
Ish e'lon qilish
</h1>


<form class="space-y-8">


<!-- TITLE -->

<div class="p-6 rounded-2xl bg-white/5 border border-white/10 backdrop-blur-xl">

<label class="text-sm text-gray-300 block mb-2">
Dastur/Ish nomi
</label>

<input
type="text"
placeholder="e.g. Software Engineering Intern"
class="w-full rounded-xl bg-white/10 border border-white/20 px-4 py-3 text-gray-200 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
>

</div>



<!-- CATEGORY -->

<div class="p-6 rounded-2xl bg-white/5 border border-white/10 backdrop-blur-xl">

<label class="text-sm text-gray-300 block mb-2">
Ish turlari
</label>

<select
class="w-full rounded-xl bg-white/10 border border-white/20 px-4 py-3 text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">

<option>Ish turlari</option>
<option>IT & Muhandislik</option>
<option>Media & Marketing</option>
<option>Moliya & Biznes</option>

</select>

</div>



<!-- DESCRIPTION -->

<div class="p-6 rounded-2xl bg-white/5 border border-white/10 backdrop-blur-xl">

<label class="text-sm text-gray-300 block mb-2">
Izoh
</label>

<textarea
rows="4"
placeholder="Describe the role, team, and what the intern will do..."
class="w-full rounded-xl bg-white/10 border border-white/20 px-4 py-3 text-gray-200 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
></textarea>

</div>



<!-- REQUIREMENTS -->

<div class="p-6 rounded-2xl bg-white/5 border border-white/10 backdrop-blur-xl">

<label class="text-sm text-gray-300 block mb-2">
Talablar
</label>

<textarea
rows="3"
placeholder="Bullet points or paragraph..."
class="w-full rounded-xl bg-white/10 border border-white/20 px-4 py-3 text-gray-200 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
></textarea>

</div>



<!-- DURATION -->

<div class="p-6 rounded-2xl bg-white/5 border border-white/10 backdrop-blur-xl">

<label class="text-sm text-gray-300 block mb-2">
Davomiylik
</label>

<select
class="w-full rounded-xl bg-white/10 border border-white/20 px-4 py-3 text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">

<option>1-3 oylar</option>
<option>3-6 oylar</option>
<option>6-12 oylar</option>

</select>

</div>



<!-- OPTIONS -->

<div class="p-6 rounded-2xl bg-white/5 border border-white/10 backdrop-blur-xl flex gap-6 text-sm">

<label class="flex items-center gap-2">
<input type="checkbox" class="accent-blue-500">
Haq to'lanadigan
</label>

<label class="flex items-center gap-2">
<input type="checkbox" class="accent-blue-500">
Online
</label>

<label class="flex items-center gap-2">
<input type="checkbox" class="accent-blue-500">
Davlat nazoratidan o'tgan
</label>

</div>



<!-- NUMBER OF POSITIONS -->

<div class="p-6 rounded-2xl bg-white/5 border border-white/10 backdrop-blur-xl">

<label class="text-sm text-gray-300 block mb-2">
Ish o'rinlari
</label>

<input
type="number"
value="1"
class="w-full rounded-xl bg-white/10 border border-white/20 px-4 py-3 text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500"
>

</div>



<!-- DEADLINE -->

<div class="p-6 rounded-2xl bg-white/5 border border-white/10 backdrop-blur-xl">

<label class="text-sm text-gray-300 block mb-2">
Qabul qilish muddati
</label>

<input
type="date"
class="w-full rounded-xl bg-white/10 border border-white/20 px-4 py-3 text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500"
>

</div>



<!-- SUBMIT -->

<div class="pt-4">

<button
type="submit"
class="px-8 py-3 rounded-xl bg-gradient-to-r from-blue-500 to-purple-500 text-white shadow-xl hover:opacity-90 transition">

Ko'rib chiqish uchun jo'natish

</button>

</div>


</form>

</section>


</body>
</html>
